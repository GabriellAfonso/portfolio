name: CI

on: [push, pull_request]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: core.settings.test
      SECRET_KEY: ci-secret-key-not-used-in-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: portfolio/requirements.txt

      - name: Install dependencies
        run: pip install -r portfolio/requirements.txt

      - name: Lint
        run: ruff check portfolio/

      - name: Security scan (bandit)
        run: bandit -r portfolio/ -c pyproject.toml

      - name: Check unmigrated model changes
        working-directory: portfolio
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        working-directory: portfolio
        run: pytest

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t portfolio:ci .
